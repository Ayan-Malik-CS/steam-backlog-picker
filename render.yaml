services:
  - type: web
    name: steam-backlog
    runtime: python
    runtimeVersion: 3.10.13
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --worker-class sync --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: FLASK_ENV
        value: production
