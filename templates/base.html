<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>What Should I Play?</title>

    <!-- Google Analytics -->
    {% if ga_tracking_id %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ ga_tracking_id }}"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ ga_tracking_id }}');
    </script>
    {% endif %}

    <style>
        :root {
            --steam-dark: #171a21;
            --steam-blue: #1b2838;
            --steam-light-blue: #66c0f4;
            --steam-card: #2a475e;
        }
        body { 
            background-color: var(--steam-dark); 
            color: #c7d5e0; 
            font-family: 'Motiva Sans', Sans-serif; 
            margin: 0;
        }
        .container { width: 90%; max-width: 1200px; margin: auto; padding: 40px 20px; }
        h1, h2, h3 { color: white; text-transform: uppercase; letter-spacing: 2px; }
        
        .game-card { 
            background: var(--steam-card); 
            padding: 0; 
            border-radius: 4px; 
            width: 280px; 
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.2);
        }
        .game-card:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px var(--steam-light-blue);
            border-color: var(--steam-light-blue);
        }
        .game-info { padding: 15px; }
        
        input[type="range"] { accent-color: var(--steam-light-blue); }
        button { 
            background: linear-gradient(to right, #47bfff 5%, #1a44c2 60%);
            color: white; border: none; padding: 12px 24px; border-radius: 2px;
            cursor: pointer; font-weight: bold;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px #66c0f4; border-color: #66c0f4; }
            50% { box-shadow: 0 0 30px #66c0f4; border-color: white; }
            100% { box-shadow: 0 0 5px #66c0f4; border-color: #66c0f4; }
        }
        .selected-game {
            animation: pulse-glow 1s infinite ease-in-out;
            border: 2px solid #66c0f4 !important;
            z-index: 10;
        }
        .icon-button {
            display: flex;
            align-items: center;      /* Vertical center */
            justify-content: center;   /* Horizontal center */
            padding: 0;                /* Remove default padding that might be off-center */
            line-height: 1;            /* Prevents text-line spacing issues */
        }
        .flash-error {
            background: rgba(169, 68, 66, 0.2);
            border: 1px solid #a94442;
            color: #e8a09e;
            padding: 12px 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 What Should I Play?</h1>
        <hr>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-error">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
